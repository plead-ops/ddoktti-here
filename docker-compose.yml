# 로컬 개발용 Postgres + Redis (PRD §7).
# 사용: docker compose up -d  →  apps/server/.env 의 localhost URL 과 매칭됨.
name: ddoktti

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ddoktti
      POSTGRES_PASSWORD: ddoktti_local
      POSTGRES_DB: ddoktti
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ddoktti"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
