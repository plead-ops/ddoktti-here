name: desktop-release

# v* 태그 push → Windows nsis 인스톨러 빌드(서명) → GitHub Release 생성.
# 설치본 + .sig + latest.json 을 첨부 → 앱이 latest.json 으로 자동 업데이트.
#
# workflow_dispatch(수동 실행) → 릴리즈 없이 설치본만 아티팩트로 업로드(테스트용).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # Release 생성

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 } # 변경 로그 생성을 위해 전체 히스토리+태그
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri -> target"
      - run: pnpm install

      # Sparse Package(신원 패키지) 빌드+서명 → identity/ddoktti-identity.msix (번들 리소스 자리).
      # tauri 빌드보다 먼저 만들어야 NSIS 설치본에 동봉된다.
      - name: Build & sign identity MSIX (Sparse Package)
        shell: pwsh
        env:
          MSIX_CERT_PFX_BASE64: ${{ secrets.MSIX_CERT_PFX_BASE64 }}
          MSIX_CERT_PASSWORD: ${{ secrets.MSIX_CERT_PASSWORD }}
        run: |
          $root = "apps/desktop/src-tauri"
          $idDir = "$root/identity"
          # 버전: 태그면 태그(v 제거), 아니면 tauri.conf.json 의 version
          if ("${{ github.ref_name }}" -like "v*") {
            $ver = "${{ github.ref_name }}".TrimStart('v')
          } else {
            $ver = (Get-Content "$root/tauri.conf.json" -Raw | ConvertFrom-Json).version
          }
          $appxVer = "$ver.0"
          Write-Host "MSIX version: $appxVer"

          # 스테이징(매니페스트 + Assets) — Assets 는 MSIX 안에 동봉
          $stage = "$env:RUNNER_TEMP/msix-stage"
          New-Item -ItemType Directory -Force -Path "$stage/Assets" | Out-Null
          (Get-Content "$idDir/AppxManifest.xml" -Raw) -replace '__VERSION__', $appxVer |
            Set-Content "$stage/AppxManifest.xml" -Encoding utf8
          Copy-Item "$root/icons/StoreLogo.png"         "$stage/Assets/StoreLogo.png"
          Copy-Item "$root/icons/Square150x150Logo.png" "$stage/Assets/Square150x150Logo.png"
          Copy-Item "$root/icons/Square44x44Logo.png"   "$stage/Assets/Square44x44Logo.png"

          # Windows SDK 의 makeappx/signtool 경로 탐색(최신 버전)
          $bin = Get-ChildItem "C:/Program Files (x86)/Windows Kits/10/bin" -Directory |
                 Where-Object { Test-Path "$($_.FullName)/x64/makeappx.exe" } |
                 Sort-Object Name -Descending | Select-Object -First 1
          $makeappx = "$($bin.FullName)/x64/makeappx.exe"
          $signtool = "$($bin.FullName)/x64/signtool.exe"
          Write-Host "makeappx: $makeappx"

          # 패키징(/nv: 외부 콘텐츠 경로 검증 생략)
          & $makeappx pack /o /d $stage /nv /p "$idDir/ddoktti-identity.msix"
          if ($LASTEXITCODE -ne 0) { throw "makeappx failed ($LASTEXITCODE)" }

          # 서명(자체 서명 pfx)
          $pfx = "$env:RUNNER_TEMP/codesign.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:MSIX_CERT_PFX_BASE64))
          & $signtool sign /fd SHA256 /f $pfx /p $env:MSIX_CERT_PASSWORD "$idDir/ddoktti-identity.msix"
          if ($LASTEXITCODE -ne 0) { throw "signtool failed ($LASTEXITCODE)" }
          Remove-Item $pfx -Force
          Write-Host "MSIX built & signed."

      - name: Build (Tauri, nsis + 업데이터 서명 아티팩트)
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          DIAG_SLACK_WEBHOOK: ${{ secrets.DIAG_SLACK_WEBHOOK }} # 진단 전송 웹훅(option_env! 로 컴파일 주입)
        with:
          projectPath: apps/desktop
          args: "--bundles nsis"

      # ── 태그가 아닐 때(브랜치 push / 수동 실행): 릴리즈 없이 설치본만 아티팩트로 ──
      - name: Upload installer artifact (build-only)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ddoktti-here-installer
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

      # ── 이하 태그 push 일 때만: 릴리즈 생성 ──
      # productName 이 한글이라 파일명이 GitHub 에서 깨짐 → 설치본/.sig ASCII 리네임 + latest.json 생성
      - name: Prepare release assets (rename + latest.json)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $dir = "apps/desktop/src-tauri/target/release/bundle/nsis"
          $ver = "${{ github.ref_name }}".TrimStart('v')
          $exe = Get-ChildItem "$dir/*-setup.exe" | Where-Object { $_.Name -notlike '*.sig' } | Select-Object -First 1
          $sig = Get-ChildItem "$dir/*-setup.exe.sig" | Select-Object -First 1
          $name = "ddoktti-here_${ver}_x64-setup.exe"
          Move-Item $exe.FullName (Join-Path $dir $name) -Force
          Move-Item $sig.FullName (Join-Path $dir "$name.sig") -Force
          $signature = (Get-Content (Join-Path $dir "$name.sig") -Raw).Trim()
          $url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$name"
          $latest = [ordered]@{
            version   = $ver
            pub_date  = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{ "windows-x86_64" = [ordered]@{ signature = $signature; url = $url } }
          } | ConvertTo-Json -Depth 6
          Set-Content -Path (Join-Path $dir "latest.json") -Value $latest -Encoding utf8
          Write-Host $latest

      # 직전 태그 이후 커밋을 conventional 타입별로 정리해 릴리즈 노트 생성
      - name: Generate changelog
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $prev = git describe --tags --abbrev=0 "$tag^" 2>$null
          $range = if ($LASTEXITCODE -eq 0 -and $prev) { "$prev..$tag" } else { $tag }
          $commits = git log $range --no-merges --pretty=format:"%s"
          $order = @("feat","fix","perf","refactor","docs","ci","build","chore")
          $titles = @{ feat="✨ 새 기능"; fix="🐛 버그 수정"; perf="⚡ 성능"; refactor="♻️ 리팩터"; docs="📝 문서"; ci="🔧 빌드/CI"; build="🔧 빌드/CI"; chore="🧹 정리"; etc="기타" }
          $groups = @{}
          foreach ($c in $commits) {
            $type = "etc"; $desc = $c
            if ($c -match '^(\w+)(\([^)]*\))?!?:\s*(.*)$') { $type = $matches[1].ToLower(); $desc = $matches[3] }
            if ($type -eq "release") { continue }   # 버전 범프 커밋 제외
            if (-not $titles.ContainsKey($type)) { $type = "etc" }
            if (-not $groups.ContainsKey($type)) { $groups[$type] = New-Object System.Collections.ArrayList }
            [void]$groups[$type].Add($desc)
          }
          $md = "## 변경 사항`n"
          foreach ($t in ($order + "etc")) {
            if ($groups.ContainsKey($t)) {
              $md += "`n### $($titles[$t])`n"
              foreach ($d in $groups[$t]) { $md += "- $d`n" }
            }
          }
          if ($prev) { $md += "`n**전체 비교:** https://github.com/${{ github.repository }}/compare/$prev...$tag`n" }
          Set-Content -Path RELEASE_NOTES.md -Value $md -Encoding utf8
          Write-Host $md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            apps/desktop/src-tauri/target/release/bundle/nsis/ddoktti-here_*-setup.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/ddoktti-here_*-setup.exe.sig
            apps/desktop/src-tauri/target/release/bundle/nsis/latest.json
          body_path: RELEASE_NOTES.md
