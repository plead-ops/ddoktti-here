name: desktop-release

# v* 태그 push → Windows nsis 인스톨러 빌드 → GitHub Release 생성(설치본 첨부).
# 자동 업데이트/서명 피드 없음 — 사용자는 Release 에서 설치본을 받는다.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # Release 생성

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri -> target"
      - run: pnpm install

      - name: Build (Tauri, Windows nsis 인스톨러)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: apps/desktop
          args: "--bundles nsis"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
          generate_release_notes: true
