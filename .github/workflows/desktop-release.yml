name: desktop-release

# Windows nsis 인스톨러 빌드.
#  - 수동 실행(Actions 탭의 Run workflow): 설치본을 워크플로 아티팩트로 업로드 → 다운로드해 테스트.
#  - v* 태그 push: 동일 빌드(아티팩트 업로드). 자동 업데이트/서명 피드 없음.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install

      - name: Build (Tauri, Windows nsis 인스톨러)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: apps/desktop
          args: "--bundles nsis"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ddoktti-windows-nsis
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error
