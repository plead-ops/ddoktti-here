name: desktop-release

# v* 태그 push → Windows nsis 인스톨러 빌드(서명) → GitHub Release 생성.
# 설치본 + .sig + latest.json 을 첨부 → 앱이 latest.json 으로 자동 업데이트.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # Release 생성

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri -> target"
      - run: pnpm install

      - name: Build (Tauri, nsis + 업데이터 서명 아티팩트)
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          args: "--bundles nsis"

      # productName 이 한글이라 파일명이 GitHub 에서 깨짐 → 설치본/.sig ASCII 리네임 + latest.json 생성
      - name: Prepare release assets (rename + latest.json)
        shell: pwsh
        run: |
          $dir = "apps/desktop/src-tauri/target/release/bundle/nsis"
          $ver = "${{ github.ref_name }}".TrimStart('v')
          $exe = Get-ChildItem "$dir/*-setup.exe" | Where-Object { $_.Name -notlike '*.sig' } | Select-Object -First 1
          $sig = Get-ChildItem "$dir/*-setup.exe.sig" | Select-Object -First 1
          $name = "ddoktti-here_${ver}_x64-setup.exe"
          Move-Item $exe.FullName (Join-Path $dir $name) -Force
          Move-Item $sig.FullName (Join-Path $dir "$name.sig") -Force
          $signature = (Get-Content (Join-Path $dir "$name.sig") -Raw).Trim()
          $url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$name"
          $latest = [ordered]@{
            version   = $ver
            pub_date  = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{ "windows-x86_64" = [ordered]@{ signature = $signature; url = $url } }
          } | ConvertTo-Json -Depth 6
          Set-Content -Path (Join-Path $dir "latest.json") -Value $latest -Encoding utf8
          Write-Host $latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            apps/desktop/src-tauri/target/release/bundle/nsis/ddoktti-here_*-setup.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/ddoktti-here_*-setup.exe.sig
            apps/desktop/src-tauri/target/release/bundle/nsis/latest.json
          generate_release_notes: true
