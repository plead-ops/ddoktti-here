# 똑띠왔어요 — Slack App Manifest
# 사용법: https://api.slack.com/apps → "Create New App" → "From an app manifest"
#  → 워크스페이스 선택 → YAML 탭에 아래 전체를 붙여넣기 → Create.
# 생성 후 SETUP.md A절의 토큰 4개를 발급해 apps/server/.env 에 채우세요.

display_information:
  name: 똑띠왔어요
  description: 슬랙 알림을 놓치지 않게 화면에 오버레이로 알려주는 알리미
  background_color: "#38f969"

features:
  bot_user:
    display_name: 똑띠왔어요
    always_online: true

oauth_config:
  redirect_urls:
    - https://ddoktti-here.app.plead.co.kr/oauth/callback
  scopes:
    # 채택 B안: user token 통합 수신 (PRD §4.2, §6)
    user:
      - im:history
      - mpim:history
      - channels:history
      - groups:history
      - im:read
      - mpim:read
      - channels:read
      - groups:read
      - dnd:read
      - users:read
    # 봇은 운영 최소치만 (그룹 멘션 판정용 usergroups:read 포함)
    bot:
      - users:read
      - usergroups:read

settings:
  event_subscriptions:
    # Socket Mode 라 request URL 불필요
    bot_events:
      - tokens_revoked
      - app_uninstalled
    user_events:
      - message.im
      - message.mpim
      - message.channels
      - message.groups
      - dnd_updated
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: true
  # TODO: refresh 토큰 처리 구현 후 true 로 전환 권장 (PRD §13.3 토큰 회전)
  token_rotation_enabled: false
