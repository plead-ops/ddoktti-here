<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>똑띠왔어요 설정</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body class="settings">
    <main class="settings-card">
      <img class="logo" src="/sprites/sprite3.png" alt="똑띠" width="384" height="384" />
      <h1>똑띠왔어요</h1>
      <p class="muted" id="status">연결 상태를 확인하는 중…</p>

      <section id="onboarding" hidden>
        <button id="connect" class="primary">Slack으로 연결</button>
      </section>

      <section id="connected" hidden>
        <p>연결됨 ✅ 트레이에서 똑띠가 대기 중입니다.</p>

        <div class="overlay-settings">
          <label class="field">
            <span>오버레이 위치</span>
            <select id="ov-position">
              <option value="top-left">좌상</option>
              <option value="top">상</option>
              <option value="top-right">우상</option>
              <option value="left">좌</option>
              <option value="center">중앙</option>
              <option value="right">우</option>
              <option value="bottom-left">좌하</option>
              <option value="bottom">하</option>
              <option value="bottom-right">우하</option>
              <option value="custom">사용자 지정 (드래그)</option>
            </select>
          </label>
          <label class="field">
            <span>이미지 크기 <b id="ov-scale-val">1.0x</b></span>
            <input id="ov-scale" type="range" min="0.5" max="3" step="0.1" value="1" />
          </label>
          <p class="hint">오버레이를 드래그하면 위치가 '사용자 지정'으로 저장돼요 (해상도 비율 기준).</p>
        </div>

        <button id="test-overlay">오버레이 미리보기</button>
        <button id="logout" class="ghost">로그아웃</button>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
